<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 202 144" role="img" aria-label="NYMA">
  <!-- tiles -->
  <rect x="0"   y="0"  width="100" height="70" fill="#034A9A"/>
  <rect x="102" y="0"  width="100" height="70" fill="#78B4E2"/>
  <rect x="0"   y="74" width="100" height="70" fill="#5C8336"/>
  <rect x="102" y="74" width="100" height="70" fill="#A64043"/>

  <!-- N (filled: two bars + diagonal) -->
  <g fill="#fff">
    <rect x="41" y="21" width="6" height="28"/>
    <rect x="53" y="21" width="6" height="28"/>
    <polygon points="41,21 47,21 59,49 53,49"/>
  </g>

  <!-- waves -->
  <g fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round">
    <path d="M137 27 q5 -5 10 0 t10 0 t10 0"/>
    <path d="M137 36 q5 -5 10 0 t10 0 t10 0"/>
    <path d="M137 45 q5 -5 10 0 t10 0 t10 0"/>
  </g>

  <!-- pinwheel (4 half-disc blades, each bulging in the spin direction) -->
  <g fill="#fff" transform="translate(50 109)">
    <path d="M0 0 A10.5 10.5 0 0 1 0 -21 Z"/>
    <path d="M0 0 A10.5 10.5 0 0 1 0 -21 Z" transform="rotate(90)"/>
    <path d="M0 0 A10.5 10.5 0 0 1 0 -21 Z" transform="rotate(180)"/>
    <path d="M0 0 A10.5 10.5 0 0 1 0 -21 Z" transform="rotate(270)"/>
  </g>

  <!-- person -->
  <g fill="#fff">
    <circle cx="152" cy="100" r="7.5"/>
    <path d="M139 122 a13 13 0 0 1 26 0 Z"/>
  </g>
</svg>
